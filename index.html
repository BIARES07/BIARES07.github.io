<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENTARES - Próximamente</title>
    <style>
        /* Estilos Generales y Tipografía */
        body {
            font-family: 'Times New Roman', Times, serif; /* Elegante serif que combina con la tipografía del logo */
            background-color: #ffffff; /* Fondo blanco limpio */
            color: #333333; /* Texto gris oscuro principal */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Centrado vertical completo */
            text-align: center;
        }

        /* Contenedor principal */
        .container {
            max-width: 600px;
            padding: 20px;
        }

        /* Estilo del Logo */
        .logo {
            max-width: 280px; /* Tamaño controlado del logo */
            height: auto;
            margin-bottom: 20px;
        }

        /* Estilo del "Cartel" Próximamente */
        h1 {
            font-size: 3em;
            color: #b59410; /* Color dorado mate, tomado del logo */
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Texto descriptivo */
        p {
            font-size: 1.2em;
            color: #555555;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Información de contacto (opcional) */
        .contact {
            font-size: 0.9em;
            color: #888888;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="image_0.png" alt="DENTARES Logo" class="logo">

        <h1>Próximamente</h1>

        <p>Nuestro nuevo sitio web dental está en construcción. Vuelve pronto para descubrir nuestros servicios y agendar tu cita.</p>

        <div class="contact">
            info@dentares.es | (+34) 91 000 0000
        </div>
    </div>

</body>
</html>
